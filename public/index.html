  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => {
            console.log('Temenos SW registered:', reg.scope);
            window.__swReg = reg;
          })
          .catch(err => console.warn('SW registration failed:', err));
      });
    }

    // Helper to send messages to SW
    window.swMessage = function(msg) {
      if (navigator.serviceWorker.controller) {
        navigator.serviceWorker.controller.postMessage(msg);
      }
    };

    // Request notification permission
    window.requestNotifications = async function() {
      if ('Notification' in window) {
        const result = await Notification.requestPermission();
        return result === 'granted';
      }
      return false;
    };
  </script>

    // ── HELPERS ────────────────────────────────────────────────────
    function getMoonPhase(date) {
      const known = new Date(2000, 0, 6, 18, 14, 0);
      const phase = ((((date - known) / 86400000) % 29.530588853) + 29.530588853) % 29.530588853;
      if (phase < 1.85) return { name:"New Moon", symbol:"🌑", note:"A threshold. The dark before the spark." };
      if (phase < 5.54) return { name:"Waxing Crescent", symbol:"🌒", note:"Something is gathering. Tend the intention." };
      if (phase < 9.22) return { name:"First Quarter", symbol:"🌓", note:"Decision point. What needs doing?" };
      if (phase < 12.91) return { name:"Waxing Gibbous", symbol:"🌔", note:"Refinement. Almost there." };
      if (phase < 16.61) return { name:"Full Moon", symbol:"🌕", note:"Fullness and revelation. Illuminate." };
      if (phase < 20.30) return { name:"Waning Gibbous", symbol:"🌖", note:"Release begins. What served its purpose?" };
      if (phase < 23.99) return { name:"Last Quarter", symbol:"🌗", note:"Let go. Clear the ground." };
      return { name:"Waning Crescent", symbol:"🌘", note:"Rest. The world is asking for less." };
    }

    function getDailyCardIdx(date) {
      return (date.getFullYear()*10000+(date.getMonth()+1)*100+date.getDate())%22;
    }

    function formatDuration(ms) {
      if(ms<=0) return "00:00:00";
      const s=Math.floor(ms/1000);
      return `${String(Math.floor(s/3600)).padStart(2,"0")}:${String(Math.floor((s%3600)/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
    }

    function dateKey(date) {
      return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,"0")}-${String(date.getDate()).padStart(2,"0")}`;
    }

    function calKey(date) {
      return `${String(date.getMonth()+1).padStart(2,"0")}-${String(date.getDate()).padStart(2,"0")}`;
    }

    function parseTimeToDate(timeStr, baseDate) {
      const [h,m]=timeStr.split(":").map(Number);
      const d=new Date(baseDate); d.setHours(h,m,0,0); return d;
    }

    function addDays(date,n) { const d=new Date(date); d.setDate(d.getDate()+n); return d; }
    function isSameDay(a,b) { return dateKey(a)===dateKey(b); }

    function getSeasonNote(date) {
      const m=date.getMonth(), d=date.getDate();
      if((m===2&&d>=20)||(m===3&&d<20)) return "Aries season — the ram charges through the vernal gate.";
      if((m===3&&d>=20)||(m===4&&d<21)) return "Taurus season — the senses deepen; the earth asks to be touched.";
      if((m===4&&d>=21)||(m===5&&d<21)) return "Gemini season — the mind quickens; connections multiply.";
      if((m===5&&d>=21)||(m===6&&d<23)) return "Cancer season — the waters rise; the threshold between worlds thins.";
      if((m===6&&d>=23)||(m===7&&d<23)) return "Leo season — the sun at its most sovereign; the creative fire burns bright.";
      if((m===7&&d>=23)||(m===8&&d<23)) return "Virgo season — the harvest of discernment; the sacred in the particular.";
      if((m===8&&d>=23)||(m===9&&d<23)) return "Libra season — the balance is sought; beauty as a form of justice.";
      if((m===9&&d>=23)||(m===10&&d<22)) return "Scorpio season — descent into the depths; the threshold widens.";
      if((m===10&&d>=22)||(m===11&&d<22)) return "Sagittarius season — the archer aims at the horizon.";
      if((m===11&&d>=22)||(m===0&&d<20)) return "Capricorn season — the mountain; the long patient work of ascent.";
      if((m===0&&d>=20)||(m===1&&d<19)) return "Aquarius season — the water-bearer pours; vision before its time.";
      return "Pisces season — the veil between worlds; the mystic's own season.";
    }

    // ── STORAGE ────────────────────────────────────────────────────
    const DEFAULT_DAY = { fastStart:"22:45", fastHours:16, water:0, weight:"", foodLog:[], oracleText:null };

    async function loadDay(date) {
      try {
        const raw = localStorage.getItem(`temenos:day:${dateKey(date)}`);
        if (raw) return {...DEFAULT_DAY,...JSON.parse(raw)};
      } catch {}
      return {...DEFAULT_DAY};
    }

    function saveDay(date, data) {
      try { localStorage.setItem(`temenos:day:${dateKey(date)}`, JSON.stringify(data)); } catch {}
    }

    // ── NOTIFICATION HELPERS ───────────────────────────────────────
    function scheduleFastNotifications(fastStart, fastHours, cardName, moonName) {
      const today = new Date(); today.setHours(0,0,0,0);
      const start = parseTimeToDate(fastStart, today);
      if (start < new Date()) start.setDate(start.getDate() + 1);
      const end = new Date(start.getTime() + fastHours * 3600000);

      window.swMessage({ type:'SCHEDULE_FAST_END', payload:{ endTime: end.getTime(), cardName, moonName }});
      window.swMessage({ type:'SCHEDULE_FAST_START', payload:{ startTime: start.getTime(), cardName, moonName }});
    }

    // ── APP ────────────────────────────────────────────────────────
    function App() {
      const todayStamp = useRef((() => { const d=new Date(); d.setHours(0,0,0,0); return d; })());
      const [viewDate,setViewDate] = useState(todayStamp.current);
      const [now,setNow] = useState(new Date());
      const [tab,setTab] = useState("fast");
      const [dayData,setDayData] = useState(null);
      const [foodNote,setFoodNote] = useState("");
      const [expandedId,setExpandedId] = useState(null);
      const [expansions,setExpansions] = useState({});
      const [expansionLoading,setExpansionLoading] = useState(null);
      const [oracleLoading,setOracleLoading] = useState(false);
      const [notifGranted,setNotifGranted] = useState(false);
      const [showNotifBanner,setShowNotifBanner] = useState(false);

      useEffect(()=>{
        const t=setInterval(()=>setNow(new Date()),1000);
        // Check notification permission
        if('Notification' in window) {
          setNotifGranted(Notification.permission === 'granted');
          setShowNotifBanner(Notification.permission === 'default');
        }
        return ()=>clearInterval(t);
      },[]);

      useEffect(()=>{
        setDayData(null); setFoodNote(""); setExpandedId(null);
        loadDay(viewDate).then(setDayData);
      },[viewDate]);

      const saveTimer=useRef(null);
      useEffect(()=>{
        if(!dayData) return;
        clearTimeout(saveTimer.current);
        saveTimer.current=setTimeout(()=>saveDay(viewDate,dayData),900);
        return ()=>clearTimeout(saveTimer.current);
      },[dayData,viewDate]);

      const updateDay=useCallback((u)=>setDayData(p=>p?{...p,...u}:p),[]);

      const isToday=isSameDay(viewDate,todayStamp.current);
      const moon=getMoonPhase(viewDate);
      const cardIdx=getDailyCardIdx(viewDate);
      const calEntries=SACRED_CALENDAR[calKey(viewDate)]||[];

      let fw=null;
      if(dayData){
        const s=parseTimeToDate(dayData.fastStart,viewDate);
        if(s>(isToday?now:viewDate)) s.setDate(s.getDate()-1);
        const e=new Date(s.getTime()+dayData.fastHours*3600000);
        const inW=isToday&&now>=s&&now<=e;
        const elapsed=(isToday?now:e)-s;
        const total=dayData.fastHours*3600000;
        fw={start:s,end:e,inWindow:inW,remaining:e-(isToday?now:e),progress:Math.min(1,Math.max(0,elapsed/total))};
      }

      // Schedule notifications when fast window changes
      useEffect(()=>{
        if(dayData&&notifGranted&&isToday){
          scheduleFastNotifications(dayData.fastStart,dayData.fastHours,CARD_NAMES[cardIdx],moon.name);
        }
      },[dayData?.fastStart,dayData?.fastHours,notifGranted,isToday]);

      const requestNotifs = async () => {
        const granted = await window.requestNotifications();
        setNotifGranted(granted);
        setShowNotifBanner(false);
        if(granted&&dayData){
          scheduleFastNotifications(dayData.fastStart,dayData.fastHours,CARD_NAMES[cardIdx],moon.name);
        }
      };

      const generateOracle=useCallback(async(force=false)=>{
        if(!dayData) return;
        if(dayData.oracleText&&!force) return;
        setOracleLoading(true);
        try{
          const cardName=CARD_NAMES[cardIdx], cardKeywords=CARD_KEYWORDS[cardIdx];
          const resp=await fetch("https://temenos-proxy.codhearth.workers.dev",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:`You are an oracular voice: spare, poetic, liminal. You speak in the tradition of received text and Symbolist poetry. Your oracle readings are 3-5 sentences, evocative, speaking to the threshold between the personal and the cosmic. Write as if for a poet and mystic who works in the tradition of contemplative practice and has twenty years of tarot experience. Avoid generic wellness language.`,messages:[{role:"user",content:`Card: ${cardName} (${cardKeywords}). Moon: ${moon.name}. Date: ${viewDate.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"})}. Give a brief oracle reading for this day.`}]})});
          const data=await resp.json();
          updateDay({oracleText:data.content?.find(b=>b.type==="text")?.text||"The oracle is silent today."});
        } catch { updateDay({oracleText:"The veil is thick today. Return again."}); }
        setOracleLoading(false);
      },[dayData,cardIdx,moon.name,viewDate,updateDay]);

      useEffect(()=>{
